# Quick test (~5 min)
geometry:
  center: [0.5, 0.5]
  half_length: 0.15
  angle: 0.0
  domain_size: [1.0, 1.0]
  enrichment_radius: 0.12
  enrichment_inner: 0.05

material:
  E: 1.0
  nu: 0.3
  traction: 0.1
  formulation: plane_stress

training:
  num_domain: 2000
  num_boundary: 100
  num_crack_surface: 100
  adam_iterations: 3000
  adam_lr: 0.001
  use_lbfgs: false
  lbfgs_iterations: 0
  adaptive_sampling: true
  resample_every: 500
  loss_weight_pde: 1.0
  loss_weight_bc: 10.0
  loss_weight_crack: 10.0
